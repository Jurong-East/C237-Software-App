<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4 Exercise</title>
</head>
<body>
    <h1 id="message">Welcome</h1>
    <button onclick="showMessage()">Click Me</button>
    <button onclick="changeColor()">Change Text Color</button>
<br><br>
    Name: <input id = "name">
    <button onclick="showName()">Submit</button>
    
    <script>

        document.getElementById("message").innerText = "Hello Student!"

        function showName(){
            let input_name = document.getElementById("name").value
            document.getElementById("message").innerText = "Hello, " + input_name
        }


        function showMessage(){
            alert("Welcome to C237")
        }
        document.getElementById("message").style.color = "red"

        function changeColor(){
            document.getElementById("message").style.color = "blue"
        }
    </script>
</body>
</html>
