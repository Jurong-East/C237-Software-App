<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<style>
.btn-gradient {
  background: linear-gradient(45deg, #6a11cb, #2575fc);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.btn-gradient:hover {
  opacity: 0.8;
}
</style>
<body>
<body class="bg-white">
    <div class="container text-center mt-5">
    <h1 class="btn-gradient" id="message">Reynald Counter App</h1>
    <h2 id="number" class ="display-4 my-4" >0</h2>
    <button class="btn-gradient" onclick="increase()">Increase Number</button>
    <button class="btn-gradient" onclick="decrease()">Decrease Number</button>
    <br><br>
    <button class="btn-gradient" onclick="reset()">Reset Counter</button>
    <script>
        let count = 0;
        
        function reset(){
            count = 0
            document.getElementById("number").textContent = count;
        }

        function increase(){
            count ++
            document.getElementById("number").textContent = count;
        }
        
        function decrease(){
            count --
            document.getElementById("number").textContent = count;
        }
    </script>
</div>
</body>
</body>
</html>
