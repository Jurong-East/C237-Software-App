<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Introduction Form</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    /* Override styles.css .card for the form page layout */
    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card-header { margin-bottom: 2rem; }
    .card-header p { font-size: 0.9rem; color: #6b7280; margin-top: 4px; }

    .divider { border: none; border-top: 1px solid #f3f4f6; margin-bottom: 1.75rem; }

    .form-group { margin-bottom: 1.25rem; }

    .required { color: #ef4444; margin-left: 2px; }

    .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 4px; }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #374151;
      font-weight: 400;  /* override label bold from styles.css */
      margin-bottom: 0;
    }

    .radio-option input[type="radio"] {
      width: 17px;
      height: 17px;
      accent-color: #6366f1;
      cursor: pointer;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* submit button: styles.css [type="submit"] makes it orange with white text */
    /* .submit-btn class kept for compatibility */
    .submit-btn { margin-top: 0.5rem; }

    .success-msg {
      display: none;
      background: #d1fae5;
      color: #065f46;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      margin-top: 1rem;
    }

    .back-link {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      text-align: center;
    }

    /* Keep the back link h1 modest — override styles.css h1 blue for this one */
    .back-link-heading {
      font-size: 1rem;
      color: #374151;
      font-weight: 400;
      margin-top: 1.5rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      .two-col { grid-template-columns: 1fr; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <h1>Self Introduction Form</h1>
      <p>Fill in the details below to introduce yourself.</p>
    </div>
    <hr class="divider" />

    <form id="introForm" onsubmit="handleSubmit(event)">

      <!-- Name -->
      <div class="form-group">
        <label for="name">Full name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="e.g. Alex Tan" required />
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender <span class="required">*</span></label>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="gender" value="Male" required /> Male</label>
          <label class="radio-option"><input type="radio" name="gender" value="Female" /> Female</label>
          <label class="radio-option"><input type="radio" name="gender" value="Prefer not to say" /> Prefer not to say</label>
        </div>
      </div>

      <!-- Email + Phone -->
      <div class="two-col">
        <div class="form-group">
          <label for="email">Email address <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone number <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="+65 9123 4567" required />
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="form-group">
        <label for="dob">Date of birth <span class="required">*</span></label>
        <input type="date" id="dob" name="dob" required />
      </div>

      <!-- Nationality -->
      <div class="form-group">
        <label for="nationality">Nationality</label>
        <select id="nationality" name="nationality">
          <option value="" disabled selected>Select your nationality</option>
          <option>Singapore</option>
          <option>Malaysia</option>
          <option>Indonesian</option>
          <option>Filipino</option>
          <option>Indian</option>
          <option>China</option>
          <option>Other</option>
        </select>
      </div>

      <!-- About Me -->
      <div class="form-group">
        <label for="about">About me</label>
        <textarea id="about" name="about" placeholder="Tell us a little about yourself — your interests, goals, or anything you'd like to share..."></textarea>
      </div>

      <!-- submit: styled orange by [type="submit"] in styles.css -->
      <button type="submit" class="submit-btn">Submit introduction</button>

      <!-- FIX: this div was missing, causing a JS error on submit -->
      <div class="success-msg" id="successMsg">
        Your introduction has been submitted successfully!
      </div>

    </form>
  </div>

  <p class="back-link"><a href="SelfIntro.html">← Back to intro page</a></p>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('introForm').querySelectorAll('input, select, textarea, button').forEach(el => el.disabled = true);
    }
  </script>

</body>
</html>
